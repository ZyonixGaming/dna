        // --- Core Logic ---

const defaultWeights=[1,0,0,0];

        // Parse genes.xml
        function parseGenes(xmlString) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString, "text/xml");
            const nodes = xml.querySelectorAll("gene");
            const parsed = [];
            nodes.forEach(node => {
                parsed.push({
                    name: node.getAttribute("name"),
                    bases: node.getAttribute("n").split("")
                });
            });
            return parsed;
        }

        // Parse pop.xml (Handles Inheritance Recursively)
        function parsePops(xmlString) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString, "text/xml");
            const result = {};

            function resolvePop(node, parentGenes) {
                if (node.tagName !== "pop") return;
				
                const popName = node.getAttribute("name");
                const currentGenes = { ...parentGenes };
				//console.log("name: " + popName);
                Array.from(node.children).forEach(child => {
                    if (child.tagName === "gene") {
                        const gName = child.getAttribute("name");
                        const p0 = parseInt(child.getAttribute("p0") || 0);
                        const p1 = parseInt(child.getAttribute("p1") || 0);
                        const p2 = parseInt(child.getAttribute("p2") || 0);
                        const p3 = parseInt(child.getAttribute("p3") || 0);

                        let probs = [p0, p1, p2, p3];
                        // If all are 0, default to equal chance
                        if (p0 === 0 && p1 === 0 && p2 === 0 && p3 === 0) {
                            probs = defaultWeights;
                        }
                        currentGenes[gName] = probs;
                    }
                });

                if (popName) result[popName] = currentGenes;

                // Recurse to children
                Array.from(node.children).forEach(child => {					
                    if (child.tagName === "pop"){
						//console.log("parent: " + popName);
						resolvePop(child, currentGenes);
					}					
                });
            }

            const popNodes = xml.querySelectorAll("pops > pop");
            popNodes.forEach(n => resolvePop(n, {}));
            return result;
        }

        // Utility: Weighted Random
function weightedRandom(weights) {
    // 1. Transform [a, b, c, d] into inverse weights [1/a, 1/b, 1/c, 1/d]
    // If a value is 0, its weight is 0 (0% chance)
    let inverseWeights = weights.map(w => w === 0 ? 0 : 1 / w);
    
    // 2. Calculate the sum of inverse weights (1/a + 1/b + 1/c + 1/d)
    let sum = inverseWeights.reduce((sum, w) => sum + w, 0);
    
    // If all inputs were 0 or the array is empty, return a fallback index
    if (sum === 0) return 0; 
    
    // 3. Perform the standard weighted random selection
    let r = Math.random() * sum;
    for (let i = 0; i < inverseWeights.length; i++) {
        r -= inverseWeights[i];
        if (r <= 0) return i;
    }
    
    return inverseWeights.length - 1;
}

        // Generate DNA
        function generateDNA(popName) {
            let result = "";
            const popConfig = popData[popName];

            for (let h = 0; h < GENOME_MAP.length; h++) {
                let seq1 = "";
                let seq2 = "";
                let positions = GENOME_MAP[h];

                for (let p = 0; p < positions.length; p++) {
                    let geneIndex = positions[p];
                    let gene = genesArray[geneIndex];
                    if (!gene) {
                        seq1 += "?"; seq2 += "?"; continue; 
                    }
                    
                    //let weights = popConfig[gene.name] || [1, 1, 1, 1];
					let weights = popConfig[gene.name] || defaultWeights;

                    let allele1 = weightedRandom(weights);
                    let allele2 = weightedRandom(weights);

                    seq1 += gene.bases[allele1];
                    seq2 += gene.bases[allele2];
                }

                let prefix = h.toString().padStart(2, '0');
                result += `${prefix}:${seq1}\n${prefix}:${seq2}\n`;
            }

            const ta = document.getElementById('dna-output');
            ta.value = result;
            validateDNA(); // Validate state instantly
        }

        // Validate DNA across all populations
        function validateDNA() {
            const text = document.getElementById('dna-output').value.trim();
            const popBtns = document.querySelectorAll('.pop-btn');
            
            if (!text) {
                popBtns.forEach(btn => btn.classList.remove('invalid'));
                return;
            }

            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const sequences = [];
            
            for (let line of lines) {
                let parts = line.split(':');
                if (parts.length === 2) {
                    sequences.push({
                        helix: parseInt(parts[0], 10),
                        seq: parts[1]
                    });
                }
            }

            for (let popName in popData) {
                let isValid = true;
                const popConfig = popData[popName];

                for (let entry of sequences) {
                    if (entry.helix < 0 || entry.helix >= GENOME_MAP.length) continue;
                    let positions = GENOME_MAP[entry.helix];
                    
                    if (entry.seq.length !== positions.length) {
                        isValid = false; break;
                    }

                    for (let p = 0; p < positions.length; p++) {
                        let geneIndex = positions[p];
                        let gene = genesArray[geneIndex];
                        if (!gene) continue;

                        let weights = popConfig[gene.name] || defaultWeights;
                        let baseChar = entry.seq[p];

                        // Find compatible alleles for the character
                        let possibleAlleles = [];
                        for(let i = 0; i < 4; i++) {
                            if (gene.bases[i] === baseChar) possibleAlleles.push(i);
                        }

                        // Invalid if character is missing entirely, OR if probability is 0 for all matches
                        if (possibleAlleles.length === 0 || possibleAlleles.every(i => weights[i] === 0)) {
                            isValid = false;
                            break;
                        }
                    }
                    if (!isValid) break;
                }

                let btn = document.querySelector(`.pop-btn[data-pop="${popName}"]`);
                if (btn) {
                    if (isValid) btn.classList.remove('invalid');
                    else btn.classList.add('invalid');
                }
            }
        }

                btn.textContent = popName;
                btn.dataset.pop = popName;
                btn.onclick = () => generateDNA(popName);
                container.appendChild(btn);
            });
        }

            let loadedGenes = null;

                const res = await fetch('pop.xml');
                if (res.ok) loadedPops = await res.text();

            // Use fetched data or fallback strings
            genesArray = parseGenes(loadedGenes || fullGenesFallback);
            popData = parsePops(loadedPops || fullPopFallback);

            renderButtons();
        }
