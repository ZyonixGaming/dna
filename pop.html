<script>

        // Utility: Weighted Random
function weightedRandom(weights) {
    // 1. Transform [a, b, c, d] into inverse weights [1/a, 1/b, 1/c, 1/d]
    // If a value is 0, its weight is 0 (0% chance)
    let inverseWeights = weights.map(w => w === 0 ? 0 : 1 / w);
    
    // 2. Calculate the sum of inverse weights (1/a + 1/b + 1/c + 1/d)
    let sum = inverseWeights.reduce((sum, w) => sum + w, 0);
    
    // If all inputs were 0 or the array is empty, return a fallback index
    if (sum === 0) return 0; 
    
    // 3. Perform the standard weighted random selection
    let r = Math.random() * sum;
    for (let i = 0; i < inverseWeights.length; i++) {
        r -= inverseWeights[i];
        if (r <= 0) return i;
    }
    
    return inverseWeights.length - 1;
}

        // Generate DNA
        function generateDNA(popName) {
            let result = "";
            const popConfig = window.popData[popName];

            for (let h = 0; h < GENE_MAP.length; h++) {
                let seq1 = "";
                let seq2 = "";
                let positions = GENE_MAP[h];

                for (let p = 0; p < positions.length; p++) {                    
                    let gene = arrayHp[h][p];
                    if (!gene) {
                        seq1 += "?"; seq2 += "?"; continue; 
                    }
                    
                    //let weights = popConfig[gene.name] || [1, 1, 1, 1];
					let weights = popConfig[gene.desc] || defaultWeights;

                    let allele1 = weightedRandom(weights);
                    let allele2 = weightedRandom(weights);

                    seq1 += gene.n[allele1];
                    seq2 += gene.n[allele2];
                }

                let prefix = h.toString().padStart(2, '0');
				if (result.length>0){
					result += `\n`;
				}
                result += `${prefix}:${seq1}\n${prefix}:${seq2}`;
            }

            const ta = document.getElementById('dna-output');
            ta.value = result;
            validateDNA(); // Validate state instantly
        }

        // Validate DNA across all populations
        function validateDNA() {
            const text = document.getElementById('dna-output').value.trim();
            const popBtns = document.querySelectorAll('.pop-btn');
            
            if (!text) {
                popBtns.forEach(btn => btn.classList.remove('invalid'));
                return;
            }

            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const sequences = [];
            
            for (let line of lines) {
                let parts = line.split(':');
                if (parts.length === 2) {
                    sequences.push({
                        helix: parseInt(parts[0], 10),
                        seq: parts[1]
                    });
                }
            }

            for (let popName in window.popData) {
                let isValid = true;
                const popConfig = window.popData[popName];

                for (let entry of sequences) {
                    if (entry.helix < 0 || entry.helix >= GENE_MAP.length) continue;
                    let positions = GENE_MAP[entry.helix];
                    
                    if (entry.seq.length !== positions.length) {
                        isValid = false; break;
                    }

                    for (let p = 0; p < positions.length; p++) {
                       
                        let gene = arrayHp[entry.helix][p];
                        if (!gene) continue;

                        let weights = popConfig[gene.desc] || defaultWeights;
                        let baseChar = entry.seq[p];

                        // Find compatible alleles for the character
                        let possibleAlleles = [];
                        for(let i = 0; i < 4; i++) {
                            if (gene.n[i] === baseChar) possibleAlleles.push(i);
                        }

                        // Invalid if character is missing entirely, OR if probability is 0 for all matches
                        if (possibleAlleles.length === 0 || possibleAlleles.every(i => weights[i] === 0)) {
                            isValid = false;
                            break;
                        }
                    }
                    if (!isValid) break;
                }

                let btn = document.querySelector(`.pop-btn[data-pop="${popName}"]`);
                if (btn) {
                    if (isValid) btn.classList.remove('invalid');
                    else btn.classList.add('invalid');
                }
            }
        }

        // UI Interactions
        function renderButtons() {

            const container = document.getElementById('pop-container');
            container.innerHTML = '';
            Object.keys(window.popData).forEach(popName => {
                const btn = document.createElement('button');
                btn.className = 'pop-btn';
                btn.textContent = popName;
                btn.dataset.pop = popName;
                btn.onclick = () => generateDNA(popName);
                container.appendChild(btn);
            });
        }

// Function to copy text from #dna-output
async function copyDNA() {
  const outputElement = document.getElementById('dna-output');
  // Works for both inputs/textareas (.value) and regular elements (.innerText)
  const textToCopy = outputElement.value || outputElement.innerText;

  try {
    await navigator.clipboard.writeText(textToCopy);
    console.log('DNA sequence copied to clipboard!');
  } catch (err) {
    console.error('Failed to copy: ', err);
  }
}

// Function to paste text into #dna-output
async function pasteDNA() {
  const outputElement = document.getElementById('dna-output');

  try {
    const text = await navigator.clipboard.readText();
    
    if ('value' in outputElement) {
      outputElement.value = text; // For input or textarea
    } else {
      outputElement.innerText = text; // For div, span, or paragraph
    }
	const event = new Event('input', { });
	outputElement.dispatchEvent(event);	
    console.log('DNA sequence pasted!');
  } catch (err) {
    console.error('Failed to paste: ', err);
  }
}

        function clearDNA() {
            document.getElementById('dna-output').value = '';
            validateDNA();
        }

        // Add Listeners
        document.getElementById('dna-output').addEventListener('input', validateDNA);

        document.getElementById('genes-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];

				await loadGeneDataFromXml(ev.target.result);

            reader.onload = async(ev) => {

                //popData = parsePops(ev.target.result);
                renderButtons();
                validateDNA();
            };
            reader.readAsText(file);
        });

        async function init() {
			await loadGeneDataFromXml();
			await loadPopDataFromXml();


            // Use fetched data or fallback strings
            //genesArray

            renderButtons();
        }

        window.onload = init;
    </script>
