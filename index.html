<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>DNA Shortener</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: #1e293b;
      border-radius: 1.2rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      padding: 2rem 2.2rem;
    }
    h1 {
      font-weight: 600;
      margin: 0 0 0.2rem;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .link-area {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.7rem;
      padding: 0.6rem 0.9rem;
      margin: 1rem 0 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .link-area input {
      flex: 1;
      border: 1px solid #475569;
      border-radius: 0.5rem;
      padding: 0.45rem 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 0.85rem;
      min-width: 220px;
    }
    .button-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 0.7rem;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }
    button:hover { background: #2563eb; transform: translateY(-1px); }
    button.ghost { background: #334155; color: #cbd5e1; }
    button.ghost:hover { background: #475569; }
    .dna-editor {
      width: 100%;
      min-height: 280px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.95rem;
      padding: 0.9rem;
      border: 1px solid #475569;
      border-radius: 0.8rem;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
      margin-top: 0.4rem;
      white-space: pre-wrap;
      word-break: break-all;
      outline: none;
      position: relative;
    }
    .dna-editor:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }
    .dna-editor.empty::before {
      content: attr(data-placeholder);
      color: #64748b;
      pointer-events: none;
      position: absolute;
      top: 0.9rem;
      left: 0.9rem;
      opacity: 0.6;
    }
    .error-msg {
      color: #fca5a5;
      background: #7f1d1d;
      padding: 0.6rem 1rem;
      border-radius: 0.6rem;
      font-size: 0.9rem;
      margin: 0.5rem 0 0.2rem;
      display: none;
    }
    .small-note {
      font-size: 0.8rem;
      color: #94a3b8;
      margin: 0.2rem 0 0;
    }
    .dna-editor .base-A { color: #facc15; font-weight: 600; }
    .dna-editor .base-C { color: #60a5fa; font-weight: 600; }
    .dna-editor .base-G { color: #4ade80; font-weight: 600; }
    .dna-editor .base-T { color: #f87171; font-weight: 600; }

    /* CRISPR link */
    .crispr-link-area {
      margin-top: 0.6rem;
      margin-bottom: 1rem;
    }
    .crispr-link-area a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .crispr-link-area a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    footer a { color: #60a5fa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #1e293b;
      border-radius: 1.2rem;
      padding: 1.5rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
    }
    .sidebar h2 {
      font-size: 1.2rem;
      margin: 0;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .category-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .category-item {
      background: #0f172a;
      border-radius: 0.6rem;
      padding: 0.4rem 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: background 0.2s, border-color 0.2s;
      border: 2px solid transparent;
    }
    .category-item.selected {
      border-color: #3b82f6;
      background: #1e2a3a;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .category-name {
      flex: 1;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .category-actions {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }
    .category-actions button {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 0.2rem;
      font-size: 0.8rem;
    }
    .category-actions button:hover { color: #f1f5f9; }
    .entry-list {
      list-style: none;
      padding-left: 1rem;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .entry-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.2rem 0.4rem;
      background: #1e293b;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .entry-item:hover { background: #334155; }
    .entry-name {
      flex: 1;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entry-actions {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }
    .entry-actions button {
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: 0.1rem;
      font-size: 0.7rem;
    }
    .entry-actions button:hover { color: #f1f5f9; }
    .sidebar-controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .drag-handle {
      cursor: grab;
      color: #64748b;
      font-size: 0.9rem;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .category-item.dragging, .entry-item.dragging { opacity: 0.4; }

    .import-export-btns {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 1000;
    }
    .toast {
      background: #1e293b;
      color: #e2e8f0;
      padding: 0.7rem 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: slideIn 0.3s ease;
      min-width: 200px;
    }
    .toast.success { border-left: 4px solid #4ade80; }
    .toast.error { border-left: 4px solid #f87171; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🧬 DNA Shortener</h1>
  <p class="small-note">Edit or paste your 40‑line sequences. The sharing link updates automatically.</p>

  <div class="link-area">
    <input type="text" id="linkDisplay" readonly placeholder="Your link will appear here..." aria-label="Sharing link (copy manually)">
    <button id="copyLinkBtn" title="Copy full sharing URL"><span>📋</span> Copy Link</button>
  </div>

  <div class="button-row">
    <button id="copyTextBtn" class="ghost" title="Copy plain DNA text"><span>📄</span> Copy DNA</button>
    <button id="pasteTextBtn" class="ghost" title="Paste clipboard content into editor"><span>📥</span> Paste DNA</button>
  </div>

  <div id="errorMessage" class="error-msg"></div>

  <div id="sequenceArea" contenteditable="true" spellcheck="false" class="dna-editor" data-placeholder="Paste your DNA lines here, e.g.:
00:CTATCGCAAT
00:CTATCGCAAT
01:CTCTAAGGAGGGA
..."></div>

  <!-- Link to CRISPR editor -->
  <div class="crispr-link-area">
    <a id="crisprLink" href="https://zyonixgaming.github.io/crispr/" target="_self" rel="noopener noreferrer">🧪 Edit in CRISPR 2.0</a>

  <footer>
    <a href="https://github.com/ZyonixGaming/dna" target="_blank" rel="noopener noreferrer">
      <svg data-component="Octicon" aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path></svg>
      View source on GitHub
    </a>
  </footer>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <h2>📁 DNA Library</h2>
  <div class="sidebar-controls">
    <button id="addCategoryBtn"><span>➕</span> Add Category</button>
    <button id="saveDnaBtn"><span>💾</span> <span id="saveBtnText">Save DNA</span></button>
  </div>
  <ul class="category-list" id="categoryList"></ul>
  <div class="import-export-btns">
    <button id="exportBtn" class="ghost">Export Library</button>
    <button id="importBtn" class="ghost">Import Library</button>
  </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="importFileInput" accept=".json" style="display:none">

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  (function() {
    // ---------- Fixed lengths from example ----------
    const FIXED_LENGTHS = [10,13,13,15,11,8,11,8,11,11,13,15,13,11,11,13,15,11,11,16];
    const TOTAL_BASES = FIXED_LENGTHS.reduce((sum, len) => sum + 2*len, 0);

    const BASE_TO_BITS = { 'A': 0b00, 'C': 0b01, 'G': 0b10, 'T': 0b11 };
    const BITS_TO_BASE = ['A', 'C', 'G', 'T'];

    function bitsToBytes(bitsString) {
      const bytes = [];
      for (let i = 0; i < bitsString.length; i += 8) {
        let chunk = bitsString.substring(i, i + 8);
        while (chunk.length < 8) chunk += '0';
        bytes.push(parseInt(chunk, 2));
      }
      return new Uint8Array(bytes);
    }
    function uint8ToBase64url(buffer) {
      let binary = '';
      buffer.forEach(byte => binary += String.fromCharCode(byte));
      const base64 = btoa(binary);
      return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    function base64urlToUint8(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4 !== 0) str += '=';
      const binary = atob(str);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    function bytesToBits(bytes) {
      let bits = '';
      for (let i = 0; i < bytes.length; i++) bits += bytes[i].toString(2).padStart(8, '0');
      return bits;
    }

    function encodeSequences(linesArray) {
      if (linesArray.length !== 40) throw new Error('Exactly 40 lines are required.');
      let bits = '';
      for (let i = 0; i < 40; i++) {
        const match = linesArray[i].match(/^(\d{2}):([ACGT]+)$/);
        if (!match) throw new Error(`Invalid format at line ${i+1}: "${linesArray[i]}"`);
        const num = parseInt(match[1], 10);
        const seq = match[2];
        if (num !== Math.floor(i/2)) throw new Error(`Line numbers must be 00,00,…,19,19. Problem at line ${i+1}`);
        const expectedLen = FIXED_LENGTHS[num];
        if (seq.length !== expectedLen) throw new Error(`Line ${String(num).padStart(2,'0')} must have length ${expectedLen}. Got ${seq.length}.`);
        for (const ch of seq) bits += BASE_TO_BITS[ch].toString(2).padStart(2, '0');
      }
      const pad = (8 - (bits.length % 8)) % 8;
      bits += '0'.repeat(pad);
      return uint8ToBase64url(bitsToBytes(bits));
    }

    function decodeToLines(encodedStr) {
      const bytes = base64urlToUint8(encodedStr);
      let bits = bytesToBits(bytes);
      if (bits.length < TOTAL_BASES * 2) throw new Error('Link too short for fixed schema.');
      const seqBits = bits.substring(0, TOTAL_BASES * 2);
      const sequences = [];
      for (let i = 0; i < seqBits.length; i += 2) sequences.push(BITS_TO_BASE[parseInt(seqBits.substring(i, i+2), 2)]);
      const lines = [];
      let cursor = 0;
      for (let i = 0; i < 20; i++) {
        const len = FIXED_LENGTHS[i];
        const num = String(i).padStart(2, '0');
        lines.push(num + ':' + sequences.slice(cursor, cursor + len).join(''));
        cursor += len;
        lines.push(num + ':' + sequences.slice(cursor, cursor + len).join(''));
        cursor += len;
      }
      return lines;
    }

    function colorizeDNA(plainText) {
      return plainText.replace(/([ACGT])/g, '<span class="base-$1">$1</span>');
    }

    // ---------- DOM elements ----------
    const editor = document.getElementById('sequenceArea');
    const linkDisplay = document.getElementById('linkDisplay');
    const errorDiv = document.getElementById('errorMessage');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const copyTextBtn = document.getElementById('copyTextBtn');
    const pasteTextBtn = document.getElementById('pasteTextBtn');
    const categoryList = document.getElementById('categoryList');
    const addCategoryBtn = document.getElementById('addCategoryBtn');
    const saveDnaBtn = document.getElementById('saveDnaBtn');
    const saveBtnText = document.getElementById('saveBtnText');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFileInput = document.getElementById('importFileInput');
    const toastContainer = document.getElementById('toastContainer');
    const crisprLink = document.getElementById('crisprLink');

    // ---------- Toast ----------
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'opacity 0.3s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // ---------- Local storage ----------
    const STORAGE_KEY = 'dna_shortener_categories';

    function loadCategories() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        } catch (e) {}
      }
      return [{
        id: generateId(),
        name: 'Horse',
        entries: []
      }];
    }

    function saveCategories() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(categories));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }
	
	// ----- Cross‑tab sync -----
	const syncChannel = new BroadcastChannel('dna-shortener-sync');

	syncChannel.onmessage = (event) => {
	  if (event.data && event.data.type === 'update') {
		// Reload the latest data from localStorage
		categories = loadCategories();
		// Make sure the selected category still exists
		if (selectedCategoryId && !categories.find(c => c.id === selectedCategoryId)) {
		  selectedCategoryId = null;
		}
		renderSidebar();
		updateSaveButton();
	  }
	};

	// Helper to reload before any modification
	function reloadCategoriesFromStorage() {
	  categories = loadCategories();
	  if (selectedCategoryId && !categories.find(c => c.id === selectedCategoryId)) {
		selectedCategoryId = null;
	  }
	}

	// Replace all calls to saveCategories() with this function
	function broadcastUpdate() {
	  saveCategories();
	  syncChannel.postMessage({ type: 'update' });
	}	
	

    let categories = loadCategories();
    let selectedCategoryId = null;

    // ---------- UI update ----------
    function updatePlaceholder() {
      const text = editor.innerText.trim();
      editor.classList.toggle('empty', text === '');
    }

    function getTextAndCursor(div) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return { text: div.innerText, offset: 0 };
      const range = sel.getRangeAt(0);
      const preCaretRange = range.cloneRange();
      preCaretRange.selectNodeContents(div);
      preCaretRange.setEnd(range.endContainer, range.endOffset);
      return { text: div.innerText, offset: preCaretRange.toString().length };
    }

    function setCursor(div, offset) {
      const sel = window.getSelection();
      const range = document.createRange();
      let currentPos = 0;
      const treeWalker = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, null, false);
      let node;
      while ((node = treeWalker.nextNode())) {
        const length = node.textContent.length;
        if (currentPos + length >= offset) {
          range.setStart(node, offset - currentPos);
          range.setEnd(node, offset - currentPos);
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
        currentPos += length;
      }
      range.selectNodeContents(div);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function refreshEditorContent(preserveCursor = true) {
      const { text, offset } = getTextAndCursor(editor);
      const cleaned = text.toUpperCase().replace(/[^ACGT0-9:\n]/g, '');
      editor.innerHTML = colorizeDNA(cleaned);
      if (preserveCursor) setCursor(editor, Math.min(offset, cleaned.length));
      updatePlaceholder();
      return cleaned;
    }

    function showError(msg) {
      errorDiv.style.display = 'block';
      errorDiv.textContent = '❌ ' + msg;
    }
    function hideError() {
      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
    }

    function updateUrlParam(encoded) {
      const base = window.location.href.split('?')[0];
      history.replaceState(null, '', encoded ? `${base}?dna=${encoded}` : base);
    }

    function refreshLink() {
      const plainText = editor.innerText.trim();
      if (!plainText) {
        linkDisplay.value = '';
        updateUrlParam('');
        crisprLink.href = 'https://zyonixgaming.github.io/crispr/';
        hideError();
        return;
      }
      const lines = plainText.split(/\r?\n/).filter(l => l.trim() !== '');
      try {
        const encoded = encodeSequences(lines);
        const fullUrl = `${window.location.href.split('?')[0]}?dna=${encoded}`;
        linkDisplay.value = fullUrl;
        updateUrlParam(encoded);
        // Update CRISPR editor link with compressed DNA
        crisprLink.href = `https://zyonixgaming.github.io/crispr/?dna=${encoded}`;
        hideError();
      } catch (e) {
        showError(e.message);
        linkDisplay.value = '';
        updateUrlParam('');
        crisprLink.href = 'https://zyonixgaming.github.io/crispr/';
      }
    }

    // ---------- Sidebar rendering ----------
    function renderSidebar() {
      categoryList.innerHTML = '';
      categories.forEach(cat => {
        const li = document.createElement('li');
        li.className = 'category-item';
        if (cat.id === selectedCategoryId) li.classList.add('selected');
        li.draggable = true;
        li.dataset.categoryId = cat.id;

        li.addEventListener('dragstart', handleCategoryDragStart);
        li.addEventListener('dragover', handleCategoryDragOver);
        li.addEventListener('drop', handleCategoryDrop);
        li.addEventListener('dragend', handleDragEnd);

        const header = document.createElement('div');
        header.className = 'category-header';

        const dragHandle = document.createElement('span');
        dragHandle.className = 'drag-handle';
        dragHandle.innerHTML = '⋮⋮';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'category-name';
        nameSpan.textContent = cat.name;
        nameSpan.addEventListener('click', (e) => {
          e.stopPropagation();
          selectCategory(cat.id);
        });

        const actions = document.createElement('div');
        actions.className = 'category-actions';

        const renameBtn = document.createElement('button');
        renameBtn.innerHTML = '✏️';
        renameBtn.title = 'Rename category';
		renameBtn.addEventListener('click', (e) => {
		  e.stopPropagation();
		  const newName = prompt('New category name:', cat.name);
		  if (newName && newName.trim()) {
			reloadCategoriesFromStorage();
			const targetCat = categories.find(c => c.id === cat.id);
			if (targetCat) {
			  targetCat.name = newName.trim();
			  broadcastUpdate();
			  renderSidebar();
			  showToast(`Category renamed to "${targetCat.name}"`);
			}
		  }
		});

        const deleteBtn = document.createElement('button');
        deleteBtn.innerHTML = '🗑️';
        deleteBtn.title = 'Delete category';
		deleteBtn.addEventListener('click', (e) => {
		  e.stopPropagation();
		  if (confirm(`Delete category "${cat.name}" and all its DNA?`)) {
			reloadCategoriesFromStorage();
			categories = categories.filter(c => c.id !== cat.id);
			if (selectedCategoryId === cat.id) selectedCategoryId = null;
			broadcastUpdate();
			renderSidebar();
			updateSaveButton();
			showToast(`Category "${cat.name}" deleted`, 'error');
		  }
		});

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);
        header.appendChild(dragHandle);
        header.appendChild(nameSpan);
        header.appendChild(actions);
        li.appendChild(header);

        if (cat.id === selectedCategoryId) {
          const entryList = document.createElement('ul');
          entryList.className = 'entry-list';
          cat.entries.forEach(entry => {
            const entryLi = document.createElement('li');
            entryLi.className = 'entry-item';
            entryLi.draggable = true;
            entryLi.dataset.entryId = entry.id;
            entryLi.dataset.categoryId = cat.id;

            entryLi.addEventListener('dragstart', handleEntryDragStart);
            entryLi.addEventListener('dragover', handleEntryDragOver);
            entryLi.addEventListener('drop', handleEntryDrop);
            entryLi.addEventListener('dragend', handleDragEnd);

            const entryDragHandle = document.createElement('span');
            entryDragHandle.className = 'drag-handle';
            entryDragHandle.innerHTML = '⋮';
            entryDragHandle.style.fontSize = '0.8rem';

            const entryName = document.createElement('span');
            entryName.className = 'entry-name';
            entryName.textContent = entry.name;
            entryLi.addEventListener('click', () => {
				loadEntry(entry);
				reloadCategoriesFromStorage();
			});

            const entryActions = document.createElement('div');
            entryActions.className = 'entry-actions';

            const entryRename = document.createElement('button');
            entryRename.innerHTML = '✏️';
            entryRename.title = 'Rename DNA';
			entryRename.addEventListener('click', (e) => {
			  e.stopPropagation();
			  const newName = prompt('New name:', entry.name);
			  if (newName && newName.trim()) {
				reloadCategoriesFromStorage();
				const targetCat = categories.find(c => c.id === cat.id);
				if (targetCat) {
				  const targetEntry = targetCat.entries.find(e => e.id === entry.id);
				  if (targetEntry) {
					targetEntry.name = newName.trim();
					broadcastUpdate();
					renderSidebar();
					showToast(`DNA renamed to "${targetEntry.name}"`);
				  }
				}
			  }
			});

            const entryDelete = document.createElement('button');
            entryDelete.innerHTML = '🗑️';
            entryDelete.title = 'Delete DNA';
			entryDelete.addEventListener('click', (e) => {
			  e.stopPropagation();
			  if (confirm(`Delete DNA "${entry.name}"?`)) {
				reloadCategoriesFromStorage();
				const targetCat = categories.find(c => c.id === cat.id);
				if (targetCat) {
				  targetCat.entries = targetCat.entries.filter(e => e.id !== entry.id);
				  broadcastUpdate();
				  renderSidebar();
				  showToast(`DNA "${entry.name}" deleted`, 'error');
				}
			  }
			});

            entryActions.appendChild(entryRename);
            entryActions.appendChild(entryDelete);
            entryLi.appendChild(entryDragHandle);
            entryLi.appendChild(entryName);
            entryLi.appendChild(entryActions);
            entryList.appendChild(entryLi);
          });
          li.appendChild(entryList);
        }
        categoryList.appendChild(li);
      });
    }

    function selectCategory(id) {
      selectedCategoryId = id;
      renderSidebar();
      updateSaveButton();
    }

    function updateSaveButton() {
      const cat = categories.find(c => c.id === selectedCategoryId);
      saveBtnText.textContent = cat ? `Save DNA to ${cat.name}` : 'Save DNA';
    }

    function loadEntry(entry) {
      editor.innerHTML = colorizeDNA(entry.dnaText);
      updatePlaceholder();
      refreshLink();
      showToast(`Loaded DNA "${entry.name}"`);
    }

    // ---------- Drag & Drop ----------
    let draggedCategoryId = null;
    let draggedEntryId = null;
    let draggedFromCategoryId = null;

    function handleCategoryDragStart(e) {
      draggedCategoryId = this.dataset.categoryId;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function handleCategoryDragOver(e) {
      e.preventDefault();
      const target = e.currentTarget;
      if (target && target.dataset.categoryId !== draggedCategoryId)
        target.style.borderTop = '2px solid #3b82f6';
    }
	function handleCategoryDrop(e) {
	  e.preventDefault();
	  const target = e.currentTarget;
	  target.style.borderTop = '';
	  const targetId = target.dataset.categoryId;
	  if (!draggedCategoryId || targetId === draggedCategoryId) return;
	  reloadCategoriesFromStorage();
	  const draggedIndex = categories.findIndex(c => c.id === draggedCategoryId);
	  const targetIndex = categories.findIndex(c => c.id === targetId);
	  if (draggedIndex !== -1 && targetIndex !== -1) {
		const [moved] = categories.splice(draggedIndex, 1);
		categories.splice(targetIndex, 0, moved);
		broadcastUpdate();
		renderSidebar();
	  }
	}
    function handleEntryDragStart(e) {
      draggedEntryId = this.dataset.entryId;
      draggedFromCategoryId = this.dataset.categoryId;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    }
    function handleEntryDragOver(e) {
      e.preventDefault();
      const target = e.currentTarget;
      if (target && target.dataset.entryId !== draggedEntryId && target.dataset.categoryId === draggedFromCategoryId)
        target.style.borderTop = '2px solid #3b82f6';
    }
	function handleEntryDrop(e) {
	  e.preventDefault();
	  const target = e.currentTarget;
	  target.style.borderTop = '';
	  if (!draggedEntryId || !draggedFromCategoryId) return;
	  reloadCategoriesFromStorage();
	  const cat = categories.find(c => c.id === draggedFromCategoryId);
	  if (!cat || target.dataset.categoryId !== draggedFromCategoryId) return;
	  const draggedIndex = cat.entries.findIndex(ent => ent.id === draggedEntryId);
	  const targetIndex = cat.entries.findIndex(ent => ent.id === target.dataset.entryId);
	  if (draggedIndex !== -1 && targetIndex !== -1 && draggedIndex !== targetIndex) {
		const [moved] = cat.entries.splice(draggedIndex, 1);
		cat.entries.splice(targetIndex, 0, moved);
		broadcastUpdate();
		renderSidebar();
	  }
	}
    function handleDragEnd() {
      this.classList.remove('dragging');
      document.querySelectorAll('.category-item, .entry-item').forEach(el => el.style.borderTop = '');
      draggedCategoryId = null;
      draggedEntryId = null;
      draggedFromCategoryId = null;
    }

    // ---------- Category / Entry actions ----------
    function addCategory() {
      const name = prompt('Category name:');
      if (!name || !name.trim()) return;
	  reloadCategoriesFromStorage();
      const newCat = {
        id: generateId(),
        name: name.trim(),
        entries: []
      };
      categories.push(newCat);
      broadcastUpdate();
      renderSidebar();
      selectCategory(newCat.id);
      showToast(`Category "${newCat.name}" created`);
    }

    function saveCurrentDna() {
      if (!selectedCategoryId) {
        alert('Please select a category first.');
        return;
      }
	  reloadCategoriesFromStorage();
      const cat = categories.find(c => c.id === selectedCategoryId);
      if (!cat) return;
      const dnaText = editor.innerText;
      if (!dnaText.trim()) {
        alert('DNA editor is empty.');
        return;
      }
      const name = prompt('Name for this DNA snapshot:', `DNA ${new Date().toLocaleTimeString()}`);
      if (!name || !name.trim()) return;
      cat.entries.push({
        id: generateId(),
        name: name.trim(),
        dnaText: dnaText
      });
      broadcastUpdate();
      renderSidebar();
      showToast(`DNA "${name.trim()}" saved`);
    }

    // ---------- Export / Import ----------
    function exportLibrary() {
      const jsonStr = JSON.stringify(categories, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dna_library.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Library exported!');
    }

    function importLibrary() {
      importFileInput.click();
    }

	function handleImportFile(event) {
	  const file = event.target.files[0];
	  if (!file) return;
	  const reader = new FileReader();
	  reader.onload = function(e) {
		try {
		  const imported = JSON.parse(e.target.result);
		  if (!Array.isArray(imported)) throw new Error('Invalid format');
		  reloadCategoriesFromStorage();
		  imported.forEach(cat => {
            if (!cat.name || typeof cat.name !== 'string') throw new Error('Invalid category');
            const newCatId = generateId();
            const entries = Array.isArray(cat.entries) ? cat.entries : [];
            const newEntries = entries.map(entry => ({
              id: generateId(),
              name: entry.name || 'Unnamed DNA',
              dnaText: entry.dnaText || ''
            }));
            categories.push({
              id: newCatId,
              name: cat.name,
              entries: newEntries
            });
          });
		  
          
		  broadcastUpdate();
          renderSidebar();
          showToast(`Imported ${imported.length} categories`);
        } catch (err) {
          showToast('Invalid import file', 'error');
        }
      };
      reader.readAsText(file);
      importFileInput.value = '';
    }

    // ---------- Main event listeners ----------
    editor.addEventListener('input', function(e) {
      if (editor.dataset.updating === 'true') return;
      editor.dataset.updating = 'true';
      refreshEditorContent(true);
      refreshLink();
      editor.dataset.updating = 'false';
    });

    editor.addEventListener('paste', function(e) {
      e.preventDefault();
      const clipboardData = (e.clipboardData || window.clipboardData);
      if (!clipboardData) return;
      const pastedText = clipboardData.getData('text/plain');
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const cleaned = pastedText.toUpperCase().replace(/[^ACGT0-9:\n]/g, '');
      const textNode = document.createTextNode(cleaned);
      range.insertNode(textNode);
      range.setStartAfter(textNode);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      editor.dataset.updating = 'true';
      refreshEditorContent(true);
      refreshLink();
      editor.dataset.updating = 'false';
    });

    copyLinkBtn.addEventListener('click', () => {
      if (linkDisplay.value) {
        navigator.clipboard.writeText(linkDisplay.value).then(() => {
          copyLinkBtn.innerHTML = '<span>✅</span> Copied!';
          setTimeout(() => { copyLinkBtn.innerHTML = '<span>📋</span> Copy Link'; }, 1500);
        }).catch(() => { linkDisplay.select(); document.execCommand('copy'); });
      }
    });
    copyTextBtn.addEventListener('click', () => {
      const plain = editor.innerText;
      navigator.clipboard.writeText(plain).then(() => {
        copyTextBtn.innerHTML = '<span>✅</span> Copied!';
        setTimeout(() => { copyTextBtn.innerHTML = '<span>📄</span> Copy DNA'; }, 1500);
      }).catch(() => {
        const range = document.createRange();
        range.selectNodeContents(editor);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
      });
    });
    pasteTextBtn.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        const cleaned = text.toUpperCase().replace(/[^ACGT0-9:\n]/g, '');
        editor.innerHTML = colorizeDNA(cleaned);
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        updatePlaceholder();
        refreshLink();
        hideError();
        pasteTextBtn.innerHTML = '<span>✅</span> Pasted!';
        setTimeout(() => { pasteTextBtn.innerHTML = '<span>📥</span> Paste DNA'; }, 1500);
      } catch (err) { showError('Unable to read clipboard. Please paste manually.'); }
    });
    addCategoryBtn.addEventListener('click', addCategory);
    saveDnaBtn.addEventListener('click', saveCurrentDna);
    exportBtn.addEventListener('click', exportLibrary);
    importBtn.addEventListener('click', importLibrary);
    importFileInput.addEventListener('change', handleImportFile);

    // ---------- Initialization ----------
    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const dna = params.get('dna');
      if (dna) {
        try {
          const lines = decodeToLines(dna);
          editor.innerHTML = colorizeDNA(lines.join('\n'));
          linkDisplay.value = window.location.href;
          updatePlaceholder();
          hideError();
          showToast('DNA loaded from link');
          return true;
        } catch (e) {
          showError('Failed to decode link: ' + e.message);
          editor.innerHTML = '';
          linkDisplay.value = '';
          updatePlaceholder();
        }
      } else {
        editor.innerHTML = '';
        updatePlaceholder();
        linkDisplay.value = '';
      }
      return false;
    }

    window.addEventListener('load', () => {
      if (!categories.length) {
        categories = loadCategories();
        saveCategories();
      }
      const loadedFromUrl = loadFromUrl();
      renderSidebar();
      // Select first category if none selected
      if (!selectedCategoryId && categories.length > 0) {
        selectedCategoryId = categories[0].id;
        updateSaveButton();
        renderSidebar(); // re-render to show selection highlight
      }
      // Ensure the CRISPR link reflects current state
      refreshLink();
    });
  })();
</script>
</body>
</html>
