  <style>

    textarea {

    textarea:focus { outline: none; border-color: #e5a23b; box-shadow: 0 0 0 2px #ffde9e; }
	
	
        /* ---- Header Bar ---- */

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #48b5b5;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title span {
            font-size: 1.5rem;
        }
        .tools-dropdown {
            position: relative;
        }

        .tools-btn:hover {
            background: #3b2a18;
            border-color: #6b4c2c;
            color: #fff;
			box-shadow: 0 3px 0 #2d2b1f;

        }
        .tools-btn .arrow {

        .tools-btn.open .arrow {

<body>
<div class="card">
  <div class="header">
    <h1>🔎 Lost Horsey Finder</h1>    
	<div class="tools-dropdown" id="toolsDropdown">
            <button class="tools-btn" id="toolsBtn">
                🔧 Other Tools <span class="arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <!-- Populated by header-links.js -->
            </div>
        </div>
  </div>
  <div class="content">
    <div class="info-panel">
        Load <code><strong>save1.dat</strong></code><br>
        Typical path:
        <span class="default-path">📁 C:\Program Files (x86)\Steam\steamapps\common\Horsey Game\save\save1.dat</span>
        <br><br>
        It retrieves the Lost Horse's Genome from the save file.<br>
    </div>

    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 16px; justify-content: space-between;">
      <div>
        <button id="loadSaveBtn" class="load-btn">📂 LOAD SAVE FILE</button>
        <button id="copyBtn" class="copy-btn">📋 Copy Genome to Clipboard</button>
      </div>
      <span id="fileLabel" class="file-status">⚡ No file selected</span>
    </div>

    <label style="font-weight: bold; margin-top: 10px; display: block;">🧬 Lost Horse genome:</label>
    <textarea id="outputTextarea" rows="12" placeholder="After loading a valid save1.dat, the genome will appear here ..." readonly></textarea>
    
    <div id="statusMessage" style="margin-top: 16px; font-size: 0.85rem; font-family: monospace;"></div>
  </div>
</div>

<script src="./js/genes.js"></script>
<script>
// ------------------------------------------------------------------
// 1. CONSTANTS & MAPPING DATA
// ------------------------------------------------------------------

const targetBytes = new Set([9, 10, 11, 12, 17, 18, 19, 20, 25, 26, 27, 28, 33, 34, 35, 36]);

// ------------------------------------------------------------------
// 2. Decode byte array directly to genome string
// ------------------------------------------------------------------
function decodeGenomeToString(byteArray240) {
  let lines = [];
  for (let row = 0; row < GENE_MAP.length; row++) {
    let strand1 = "", strand2 = "";
    const indices = GENE_MAP[row];
    for (let j = 0; j < indices.length; j++) {
      const idx = indices[j];
      const byteVal = byteArray240[idx];
      if (byteVal === undefined) return null;
      const entry = geneById.get(idx);
      if (!entry || !entry.n) return null;
      if (!targetBytes.has(byteVal)) return null;
      const n1 = byteVal % 8;
      const n2 = Math.floor(byteVal / 8);
      const ch1 = entry.n[n1 - 1];
      const ch2 = entry.n[n2 - 1];
      if (!ch1 || !ch2) return null;
      strand1 += ch1;
      strand2 += ch2;
    }
    lines.push(`${String(row).padStart(2,"0")}:${strand1}`);
    lines.push(`${String(row).padStart(2,"0")}:${strand2}`);
  }
  return lines.join("\r\n");
}

// ------------------------------------------------------------------
// 3. BLOCK SEARCH: non‑overlapping 240‑byte blocks + verification
// ------------------------------------------------------------------
function findValidBlocksWithVerification(buffer, targetSet, m_value, startOffset, maxBlocks, limitOffset) {
  const blockLen = 240;
  const validBlocks = [];
  let i = startOffset;
  const totalLen = buffer.length;
  const dataView = new DataView(buffer.buffer, buffer.byteOffset, buffer.byteLength);
  
  while(i<limitOffset){
		if (!targetSet.has(buffer[i])) {
			i++;
			continue;
		}
		let j = i+1;		
		while (j < limitOffset && targetBytes.has(buffer[j])&& (j-i+1<=240)) j++;
		const len = j - i;
		if (len >= 240) {
			const val = dataView.getInt32(j+8, true);
			//console.log("v: "+val);
			if ((val > 9 && val < m_value)||(val>=0&&val<=9&&validBlocks.length==0)) {
			  validBlocks.push(i);
			  //console.log("valid");
			  i += blockLen;
			  if(validBlocks.length>=maxBlocks){
				return validBlocks;
			  }
			  
			}	
		}
		i=j;
  }
  
  return validBlocks;
}

			

// ------------------------------------------------------------------
// 4. MAIN PROCESSOR (m at 0x10, n+1, verification)
// ------------------------------------------------------------------
async function processSaveFile(file) {
  const fileLabelSpan = document.getElementById('fileLabel');
  const outputTextarea = document.getElementById('outputTextarea');
  const statusDiv = document.getElementById('statusMessage');

  function setError(msg) {
    statusDiv.innerHTML = `<span style="color:#b12a2c;">⚠️ ${escapeHtml(msg)}</span>`;
    outputTextarea.value = `[ERROR] ${msg}`;
  }
  function setSuccess(msg) { statusDiv.innerHTML = `<span style="color:#2b6e2f;">✅ ${escapeHtml(msg)}</span>`; }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  if (!file) { setError("No file selected."); fileLabelSpan.innerHTML = "❌ No file selected"; return; }
  fileLabelSpan.innerHTML = `📄 ${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)`;
  statusDiv.innerHTML = "";
  outputTextarea.value = "⏳ Scanning save file ...";
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const dataBytes = new Uint8Array(arrayBuffer);
    if (dataBytes.length < 30) throw new Error("File too small.");

    // read m from offset 0x10 (little-endian signed 32bit)
    if (0x10 + 4 > dataBytes.length) throw new Error("File too small to read m at 0x10.");
    const m = new DataView(arrayBuffer).getInt32(0x10, true);

    // locate "Willaby Ranch"
    let pattern = "Willaby Ranch";
    let patternBytes = new TextEncoder().encode(pattern);
    let pos = -1;
    for (let i = 0; i <= dataBytes.length - patternBytes.length; i++) {
      let match = true;
      for (let j = 0; j < patternBytes.length; j++) {
        if (dataBytes[i + j] !== patternBytes[j]) { match = false; break; }
      }
      if (match) { pos = i; break; }
    }
    if (pos === -1) throw new Error(`Text "Willaby Ranch" not found.`);
    
    const intOffset = pos + patternBytes.length;
	//console.log(pos);
	//console.log(intOffset);
    pattern = "Circle-D Corral";
    patternBytes = new TextEncoder().encode(pattern);
    let pos2 = -1;
    for (let i = 0; i <= dataBytes.length - patternBytes.length; i++) {
      let match = true;
      for (let j = 0; j < patternBytes.length; j++) {
        if (dataBytes[i + j] !== patternBytes[j]) { match = false; break; }
      }
      if (match) { pos2 = i; break; }
    }
    if (pos2 === -1) throw new Error(`Text "Circle-D Corral" not found.`);
    //console.log(pos2);
	const limitOffset = pos2;	
	
    if (intOffset + 4 > dataBytes.length) throw new Error("Truncated file — cannot read n.");
    const n = new DataView(arrayBuffer).getInt32(intOffset, true);

    // find all verified blocks starting after the integer
    const validBlocks = findValidBlocksWithVerification(dataBytes, targetBytes, m, intOffset + 4,n+2,limitOffset);
    
    const targetBlockIdx = n ;   // n+1 (as per requirement: n+2? your comment said n+1)
    if (targetBlockIdx < 0) throw new Error(`n+1 = ${targetBlockIdx} is negative.`);
    if (targetBlockIdx >= validBlocks.length) {
      //throw new Error(`Not enough valid blocks. Need index ${targetBlockIdx}, only ${validBlocks.length} found.`);
	  throw new Error(`Lost Horse not found. Please check the lost horse sign at Willaby Ranch, exit and save, then try this tool again.`);
    }
    
    const lettersStart = validBlocks[targetBlockIdx];
    
    const blockBytes = dataBytes.slice(lettersStart, lettersStart + 240);
    if (blockBytes.length !== 240) throw new Error("Failed to extract full 240 bytes.");
    
    const genomeString = decodeGenomeToString(blockBytes);
    if (!genomeString) throw new Error("Genome decoding failed — invalid byte mapping or targetBytes mismatch.");
    
    outputTextarea.value = genomeString;
    setSuccess(`Success: used verified block #${targetBlockIdx} (n=${n}) at offset ${lettersStart}.`);
    
  } catch (err) {
    console.error(err);
    setError(err.message);
    fileLabelSpan.innerHTML = `⚠️ Error with ${escapeHtml(file.name)}`;
  }
}

// ------------------------------------------------------------------
// 5. UI SETUP (copy to clipboard)
// ------------------------------------------------------------------

window.addEventListener('load', async () => {
	await loadGeneDataFromXml();
});

document.addEventListener('DOMContentLoaded', () => {

  const loadBtn = document.getElementById('loadSaveBtn');

  const copyBtn = document.getElementById('copyBtn');
  const outputTextarea = document.getElementById('outputTextarea');
  const fileLabelSpan = document.getElementById('fileLabel');
  const statusDiv = document.getElementById('statusMessage');

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.dat';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  function setError(msg) {
    statusDiv.innerHTML = `<span style="color:#b12a2c;">⚠️ ${msg}</span>`;
  }
  function setSuccess(msg) { statusDiv.innerHTML = `<span style="color:#2b6e2f;">✅ ${msg}</span>`; }

  loadBtn.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) processSaveFile(file);
    else fileLabelSpan.innerHTML = "⚡ No file selected";
  });

  copyBtn.addEventListener('click', async () => {
    const content = outputTextarea.value;
    if (!content || content.startsWith("[ERROR]") || content.includes("⏳ Scanning")) {
      setError("Nothing to copy. Load a valid save file first.");
      return;
    }
    try {
      await navigator.clipboard.writeText(content);
      setSuccess("Genome copied to clipboard!");
    } catch (err) {
      setError("Failed to copy: " + err.message);
    }
  });
});
</script>
<script src="./js/headers.js"></script>
</body>
</html>
